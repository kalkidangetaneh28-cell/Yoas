<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎬 Birthday Video · Slideshow with Playlist Music</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        /* floating balloons */
        .balloons {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            width: 50px;
            height: 65px;
            background: #ff8a8a;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: floatUp 12s linear infinite;
            opacity: 0.7;
        }

        .balloon::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 60px;
            background: rgba(0,0,0,0.2);
            top: 100%;
            left: 50%;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(10deg); opacity: 0; }
        }

        /* main card */
        .birthday-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 60px 20px 60px 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            padding: 2rem 2rem;
            max-width: 800px;
            width: 100%;
            text-align: center;
            z-index: 10;
            transition: all 0.4s ease;
            border: 3px solid rgba(255,245,220,0.9);
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: #ff6b6b;
            text-shadow: 3px 3px 0 #ffd93d;
            margin-bottom: 0.5rem;
        }

        .teaser {
            font-size: 1.3rem;
            background: #ffefcf;
            display: inline-block;
            padding: 0.4rem 1.8rem;
            border-radius: 50px;
            margin: 1rem 0;
            color: #c24d2c;
        }

        .gift-btn {
            cursor: pointer;
            display: inline-block;
            padding: 20px 40px;
            background: rgba(255,235,200,0.8);
            border-radius: 100px;
            margin: 20px 0;
            transition: transform 0.2s;
        }

        .gift-btn:hover {
            transform: scale(1.08);
        }

        .gift-icon {
            font-size: 7rem;
            color: #e67e22;
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.2));
            animation: wobble 2s infinite;
        }

        @keyframes wobble {
            0%,100% { transform: rotate(0deg); }
            25% { transform: rotate(8deg); }
            75% { transform: rotate(-8deg); }
        }

        .hint {
            font-size: 1.1rem;
            background: #fff0e0;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
            margin-top: 5px;
            color: #b64926;
        }

        .video-player {
            margin-top: 2rem;
            display: none;
            width: 100%;
        }

        .video-player.show {
            display: block;
            animation: fadeInUp 0.8s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slideshow-container {
            position: relative;
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
            background: #1e2a36;
        }

        .slideshow {
            position: relative;
            width: 100%;
            height: 450px;
            background: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e2a36;
        }

        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .slide-caption {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            text-shadow: 1px 1px 2px black;
            z-index: 3;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .control-btn {
            background: #ffb347;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }

        .control-btn:hover {
            background: #ff8c1a;
        }

        .music-info {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #5a3e2b;
            background: #fff0e0;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
        }

        @media (max-width: 600px) {
            .slideshow { height: 350px; }
            h1 { font-size: 2rem; }
            .gift-icon { font-size: 5rem; }
        }
    </style>
</head>

            <div class="controls">

</div>

        // ============================================================

        // ---------- MUSIC PLAYLIST (add as many as you like) ----------
        const musicPlaylist = [
            "image/amharic-birthday.mp3",   // first song
            "image/english-birthday.mp3",    // second song (add your own file)
            "image/amharic-birthday.mp3"      // third song
            // Add more songs here, e.g., "image/song3.mp3", ...
        ];
        let currentTrack = 0;
        // ============================================================

        const slideshowDiv = document.getElementById('slideshow');
        let currentIndex = 0;
        let slideInterval = null;
        let isPlaying = false;
        let audioPlaying = false;
        const bgMusic = document.getElementById('bgMusic');

        // Function to play current track from playlist
        function playCurrentTrack() {
            if (!musicPlaylist.length) return;
            bgMusic.src = musicPlaylist[currentTrack];
            bgMusic.load();
            bgMusic.play().catch(e => console.log("Cannot play track: " + musicPlaylist[currentTrack]));
            audioPlaying = true;
        }

        // When a song ends, play the next one (loop playlist)
        bgMusic.addEventListener('ended', () => {
            if (musicPlaylist.length > 0) {
                currentTrack = (currentTrack + 1) % musicPlaylist.length;
                playCurrentTrack();
            }
        });

        function startMusic() {
            if (!audioPlaying && musicPlaylist.length) {
                playCurrentTrack();
            }
        }
        function stopMusic() {
            bgMusic.pause();
            bgMusic.currentTime = 0;
            audioPlaying = false;
            currentTrack = 0; // reset playlist to first song for next start
        }

        // Create slides from imageUrls
        function buildSlides() {
            slideshowDiv.innerHTML = '';
            imageUrls.forEach((url, idx) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                if (idx === 0) slide.classList.add('active');
                const img = document.createElement('img');
                img.src = url;
                img.alt = `Slide ${idx+1}`;
                img.onerror = function() {
                    this.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ctext x="50%" y="50%" text-anchor="middle" dy=".3em" fill="%23aaa" font-size="14"%3EImage not found%3C/text%3E%3C/svg%3E';
                };
                slide.appendChild(img);
                const caption = document.createElement('div');
                caption.className = 'slide-caption';
                caption.textContent = captions[idx] || `📸 Memory ${idx+1}`;
                slide.appendChild(caption);
                slideshowDiv.appendChild(slide);
            });
        }

        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            if (!slides.length) return;
            slides.forEach((slide, i) => {
                if (i === index) slide.classList.add('active');
                else slide.classList.remove('active');
            });
        }

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if (!slides.length) return;
            currentIndex = (currentIndex + 1) % slides.length;
            showSlide(currentIndex);
        }

        function startSlideshow() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(nextSlide, 3500);
            isPlaying = true;
            const playBtn = document.getElementById('playPauseBtn');
            if (playBtn) playBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
        }

        function pauseSlideshow() {
            if (slideInterval) {
                clearInterval(slideInterval);
                slideInterval = null;
            }
            isPlaying = false;
            const playBtn = document.getElementById('playPauseBtn');
            if (playBtn) playBtn.innerHTML = '<i class="fas fa-play"></i> Play';
        }

        function stopSlideshow() {
            pauseSlideshow();
            currentIndex = 0;
            showSlide(0);
        }

        function startVideo() {
            if (!isPlaying) startSlideshow();
            if (!audioPlaying) startMusic();
        }

        function stopVideo() {
            pauseSlideshow();
            stopMusic();
            currentIndex = 0;
            showSlide(0);
        }

        // Event listeners
        const playPauseBtn = document.getElementById('playPauseBtn');
        const stopBtn = document.getElementById('stopVideoBtn');
        if (playPauseBtn) {
            playPauseBtn.addEventListener('click', () => {
                if (isPlaying) {
                    pauseSlideshow();
                } else {
                    startSlideshow();
                    if (!audioPlaying) startMusic();
                }
            });
        }
        if (stopBtn) {
            stopBtn.addEventListener('click', stopVideo);
        }

        // Gift reveal
        const giftBox = document.getElementById('giftBox');
        const videoPlayerDiv = document.getElementById('videoPlayer');
        let revealed = false;

        function burstConfetti() {
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#ffadad', '#ffd6a5', '#fdffb6', '#caffbf'] });
            setTimeout(() => confetti({ particleCount: 80, angle: 60, spread: 70, origin: { x: 0, y: 0.6 } }), 200);
            setTimeout(() => confetti({ particleCount: 80, angle: 120, spread: 70, origin: { x: 1, y: 0.6 } }), 400);
            setTimeout(() => confetti({ particleCount: 200, spread: 120, origin: { y: 0.5 }, startVelocity: 25, shapes: ['circle'] }), 600);
        }

        function reveal() {
            if (revealed) return;
            revealed = true;
            giftBox.style.transition = 'opacity 0.5s';
            giftBox.style.opacity = '0';
            setTimeout(() => {
                giftBox.style.display = 'none';
                videoPlayerDiv.classList.add('show');
                buildSlides();
                startVideo();
                burstConfetti();
                for (let i = 0; i < 8; i++) setTimeout(() => balloonContainer.appendChild(createBalloon()), i * 150);
            }, 400);
        }

        giftBox.addEventListener('click', reveal);
        giftBox.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') reveal(); });
        giftBox.setAttribute('tabindex', '0');

        window.addEventListener('load', () => {
            setTimeout(() => confetti({ particleCount: 40, spread: 60, origin: { y: 0.5 }, colors: ['#ffb347'] }), 500);
        });

    4. SLIDESHOW SPEED: Change 3500 (milliseconds) in `startSlideshow()`.
